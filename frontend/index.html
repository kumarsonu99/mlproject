,<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚨  Hate Speech Detector</title>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      min-height: 100vh;
      font-family: 'Segoe UI', -apple-system, sans-serif;
      background: linear-gradient(-45deg, #667eea, #764ba2, #f093fb, #f5576c);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #333;
    }
    
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    .glass-container {
      backdrop-filter: blur(20px);
      background: rgba(255, 255, 255, 0.25);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 25px 45px rgba(0,0,0,0.1);
      padding: 40px;
      width: 100%;
      max-width: 500px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    
    .glass-container::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(1px);
      z-index: 0;
    }
    
    .content { position: relative; z-index: 1; }
    
    h1 {
      background: linear-gradient(45deg, #fff, #f0f0f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      margin-bottom: 10px;
      font-weight: 700;
    }
    
    .subtitle { 
      color: rgba(255,255,255,0.9);
      margin-bottom: 30px;
      font-size: 1.1rem;
    }
    
    .input-group {
      position: relative;
      margin-bottom: 20px;
    }
    
    input {
      width: 100%;
      padding: 18px 20px;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      outline: none;
      transition: all 0.3s ease;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    }
    
    input:focus {
      transform: translateY(-2px);
      box-shadow: 0 15px 40px rgba(0,0,0,0.15);
      background: rgba(255,255,255,1);
    }
    
    button {
      padding: 16px 40px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(45deg, #00c9ff, #92fe9d);
      color: #333;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(0,201,255,0.4);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    button:hover { transform: translateY(-3px); box-shadow: 0 20px 40px rgba(0,201,255,0.5); }
    button:active { transform: translateY(-1px); }
    
    .loader {
      display: none;
      margin: 20px 0;
    }
    
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top: 4px solid #00c9ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .result {
      margin-top: 25px;
      padding: 20px;
      border-radius: 16px;
      font-size: 1.4rem;
      font-weight: 700;
      transform: scale(0.9);
      opacity: 0;
      transition: all 0.5s ease;
    }
    
    .result.show {
      transform: scale(1.05);
      opacity: 1;
    }
    
    .toxic { 
      background: rgba(255,77,77,0.2); 
      color: #ff4d4d;
      animation: shake 0.5s ease-in-out;
      border: 2px solid #ff4d4d;
    }
    
    .safe { 
      background: rgba(77,255,136,0.2); 
      color: #4dff88;
      border: 2px solid #4dff88;
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }
    
    .history {
      margin-top: 30px;
      text-align: left;
      max-height: 200px;
      overflow-y: auto;
    }
    
    .history-item {
      display: flex;
      justify-content: space-between;
      padding: 12px;
      margin-bottom: 10px;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      backdrop-filter: blur(10px);
    }
    
    .stats {
      display: flex;
      justify-content: space-around;
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.2);
    }
    
    .stat {
      text-align: center;
    }
    
    .stat-number {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
    }
    
    .theme-toggle {
      position: absolute;
      top: 20px;
      right: 20px;
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: white;
      transition: transform 0.3s ease;
    }
    
    .theme-toggle:hover { transform: scale(1.2); }
    
    body.dark-theme {
      background: linear-gradient(-45deg, #0f0f23, #1a1a2e, #16213e, #0f3460);
    }
    
    body.dark-theme .glass-container {
      background: rgba(15, 15, 35, 0.9);
      border-color: rgba(255,255,255,0.1);
    }
    
    body.dark-theme h1 {
      background: linear-gradient(45deg, #e0e0ff, #c0c0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    body.dark-theme .subtitle,
    body.dark-theme .stat span {
      color: rgba(255,255,255,0.8);
    }
    
    body.dark-theme input {
      background: rgba(255,255,255,0.1);
      color: white;
      backdrop-filter: blur(10px);
    }
    
    body.dark-theme input::placeholder {
      color: rgba(255,255,255,0.6);
    }
    
    body.dark-theme input:focus {
      background: rgba(255,255,255,0.2);
    }
    
    body.dark-theme .clear-btn {
      
      background: rgba(255,255,255,0.1);
    }
    
    body.dark-theme .stat-number {
      color: #e0e0ff;
    }
    
    @media (max-width: 480px) {
      .glass-container { padding: 30px 20px; margin: 10px; }
    }
    
    .clear-btn {
      margin-left: 10px;
      background: rgba(255,255,255,0.2);
      color: white;
      padding: 12px 20px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
  
  <div class="glass-container">
    <div class="content">
      <h1>🚨 AI Hate Speech Detector</h1>
      <p class="subtitle">Advanced AI detects toxic language instantly</p>
      <div style="margin-top: 10px;">
        <button onclick="loadExample('safe')" class="clear-btn" style="padding: 8px 16px; font-size: 12px; margin: 2px;">Safe Examples</button>
        <button onclick="loadExample('toxic')" class="clear-btn" style="padding: 8px 16px; font-size: 12px; margin: 2px;">Toxic Examples</button>
        <button onclick="loadRandom()" class="clear-btn" style="padding: 8px 16px; font-size: 12px; margin: 2px;">Random</button>
        <input type="text" id="searchExamples" placeholder="🔍 Search examples..." onkeyup="filterExamples()" style="padding: 8px 12px; font-size: 12px; margin: 5px 0; width: 200px;">
      </div>
      
      <div class="input-group">
        <input type="text" id="text" placeholder="Type message to analyze... (Press Enter)" />
      </div>
      
      <div style="height: 25px;"></div>
      
      <button onclick="check()">🔍 Analyze Speech</button> 
      
      <button class="clear-btn" onclick="clearAll()">Clear History</button>
      
      <div class="loader" id="loader">
        <div class="spinner"></div>
        <p>AI analyzing...</p>
      </div>
      
      <div class="result" id="result"></div>
      
      <div class="stats">
        <div class="stat">
          <div class="stat-number" id="total">0</div>
          <span>Total Scans</span>
        </div>
        <div class="stat">
          <div class="stat-number safe-text" id="safe">0</div>
          <span>Safe</span>
        </div>
        <div class="stat">
          <div class="stat-number toxic-text" id="toxic">0</div>
          <span>Toxic</span>
        </div>
      </div>
      
      <div class="history" id="history"></div>
    </div>
  </div>

  <script>
    
    const examples = {
      safe: [
        "Good morning everyone!", "I appreciate your help", "Beautiful day today", "Thank you so much",
        "You are doing great work", "Love this community", "Congratulations on your success",
        "Keep up the good work", "This is amazing content", "Very helpful information",
        "You are a good person", "Have a wonderful day", "Thanks for sharing", "Great job team",
        "I agree with you", "Positive vibes only", "You rock!", "Excellent presentation",
        "Well done everyone", "I'm proud of you"
      ],
      toxic: [
        "You are an idiot", "Shut up loser", "I hate you all", "Go kill yourself", "Stupid worthless person",
        "You're ugly and dumb", "Nobody likes you", "Die in a fire", "Fat loser", "Retarded moron",
        "Cringe failure", "Trash human being", "Get a life freak", "Annoying piece of shit",
        "Disgusting creep", "Pathetic weakling", "Cancer patient", "Burn in hell", "Rotten bastard"
      ]
    };
    
    let totalScans = 0, safeCount = 0, toxicCount = 0;
    const history = [];
    let filteredExamples = [];
    
    // Enter key support
    document.getElementById('text').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') check();
    });
    
    function loadExample(type) {
      const example = examples[type][Math.floor(Math.random() * examples[type].length)];
      document.getElementById('text').value = example;
    }
    
    function loadRandom() {
      const types = ['safe', 'toxic'];
      const type = types[Math.floor(Math.random() * types.length)];
      loadExample(type);
    }
    
    function filterExamples() {
      const query = document.getElementById('searchExamples').value.toLowerCase();
      filteredExamples = [];
      
      Object.keys(examples).forEach(type => {
        examples[type].forEach(text => {
          if (text.toLowerCase().includes(query)) {
            filteredExamples.push({text, type});
          }
        });
      });
      
      showExamples(filteredExamples);
    }
    
    function showExamples(examplesList) {
      let html = '<div style="margin-top: 10px; font-size: 12px; max-height: 100px; overflow-y: auto; text-align: left;">';
      examplesList.slice(0, 5).forEach(item => {
        html += `<div style="padding: 5px; border-radius: 5px; background: rgba(255,255,255,0.1); margin: 2px 0; cursor: pointer;" onclick="document.getElementById(\'text\').value=\`${item.text}\`">${item.text}</div>`;
      });
      html += '</div>';
      // Note: This would show under search - simple for now
    }
    async function check() {
      const text = document.getElementById('text').value.trim();
      const resultBox = document.getElementById('result');
      const loader = document.getElementById('loader');
      
      if (!text) {
        shakeInput();
        return;
      }
      
      loader.style.display = 'block';
      resultBox.className = 'result';
      resultBox.innerHTML = '';
      
      try {
        const res = await fetch('http://127.0.0.1:5000/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        
        const data = await res.json();
        loader.style.display = 'none';
        
        let result = data.result;
        if (!result) {
          if (data.error) {
            resultBox.innerHTML = `❌ Error: ${data.error}`;
            resultBox.className = 'result toxic show';
            return;
          }
          resultBox.innerHTML = '❌ Unknown error - check console';
          resultBox.className = 'result toxic show';
          return;
        }
        
        totalScans++; 
        safeCount += result === 'Not Toxic' ? 1 : 0; 
        toxicCount += result === 'Toxic' ? 1 : 0;
        updateStats();
        showResult(result, text);
        addToHistory(text, data.result);
        
        if (data.result === 'Not Toxic') {
          confetti({ particleCount: 100, spread: 70 });
        }
        
      } catch (error) {
        loader.style.display = 'none';
        resultBox.innerHTML = '❌ Connection Error - Check servers';
        resultBox.className = 'result toxic show';
      }
    }
    
    function showResult(result, text) {
      const resultBox = document.getElementById('result');
      resultBox.innerHTML = `${result === 'Not Toxic' ? '✅' : '🚨'} ${result}<br><small>"${text}"</small>`;
      resultBox.className = `result ${result === 'Not Toxic' ? 'safe' : 'toxic'} show`;
    }
    
    function addToHistory(text, result) {
      history.unshift({ text, result, time: new Date().toLocaleTimeString() });
      if (history.length > 10) history.pop();
      renderHistory();
    }
    
    function renderHistory() {
      const historyEl = document.getElementById('history');
      historyEl.innerHTML = history.map(item => 
        `<div class="history-item">
          <span>${item.text.substring(0,50)}${item.text.length > 50 ? '...' : ''}</span>
          <span class="${item.result === 'Not Toxic' ? 'safe-text' : 'toxic-text'}">${item.result}</span>
        </div>`
      ).join('');
    }
    
    function updateStats() {
      document.getElementById('total').textContent = totalScans;
      document.getElementById('total').textContent = totalScans;
      document.getElementById('safe').textContent = safeCount;
      document.getElementById('toxic').textContent = toxicCount;
    }
    
    function clearAll() {
      document.getElementById('text').value = '';
      document.getElementById('result').className = 'result';
      document.getElementById('result').innerHTML = '';
      history.length = 0;
      renderHistory();
      totalScans = safeCount = toxicCount = 0;
      updateStats();
    }
    
    function shakeInput() {
      const input = document.getElementById('text');
      input.style.animation = 'shake 0.5s ease-in-out';
      setTimeout(() => input.style.animation = '', 500);
    }
    
    function toggleTheme() {
      document.body.classList.toggle('dark-theme');
      event.target.textContent = document.body.classList.contains('dark-theme') ? '☀️' : '🌙';
    }
    
    // Auto-focus input
    window.onload = () => document.getElementById('text').focus();
  </script>
</body>
</html>
